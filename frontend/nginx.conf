server {
    listen 80;

    # Without this, nginx's default redirect-scheme guessing stamps "http://"
    # onto the 301 below, since it only ever sees plain HTTP from the reverse
    # proxy — even when the original client request was HTTPS.
    absolute_redirect off;

    location /gym/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /gym/index.html;
    }

    location /gym {
        return 301 /gym/;
    }

    location /api/gym/ {
        proxy_pass http://gym-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
